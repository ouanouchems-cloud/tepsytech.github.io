<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>TEPSY TECH</title>

<style>

/* STYLE GLOBAL */
body {
    margin: 0;
    font-family: Arial;
    background-color: #0a2a66;
    color: white;
    text-align: center;
    scroll-behavior: smooth;
}

/* MENU */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: #071d4d;
    padding: 15px;
}

nav a {
    color: white;
    margin: 0 20px;
    text-decoration: none;
    font-weight: bold;
}

/* SECTIONS */
section {
    padding: 100px 20px;
}

/* LOGO */
.logo {
    width: 120px;
}

/* PHOTO */
.photo {
    width: 200px;
    border-radius: 50%;
    border: 4px solid #00bfa6;
    margin-top: 20px;
}

/* BOUTON */
button {
    margin-top: 20px;
    padding: 10px 20px;
    background: #00bfa6;
    border: none;
    color: white;
    cursor: pointer;
}

/* VIDEO */
.video {
    margin-top: 30px;
}

</style>
</head>

<body>

<!-- MENU -->
<nav>
    <a href="#accueil">Accueil</a>
    <a href="#apropos">À propos</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
</nav>

<!-- ACCUEIL -->
<section id="accueil">
    <img src="logo.png" class="logo">
    <h1>TEPSY TECH</h1>
    <p>Santé & Technologie</p>
    <button>Me contacter</button>
</section>

<!-- A PROPOS -->
<section id="apropos">
    <h2>À propos</h2>
    <p>Je suis spécialisé dans la technologie et les solutions santé.</p>
    <img src="photo.jpg" class="photo">
</section>

<!-- SERVICES -->
<section id="services">
    <h2>Mes Services</h2>
    <p>Création de sites web, solutions digitales, santé et technologie.</p>
</section>

<!-- VIDEO -->
<section>
    <h2>Présentation vidéo</h2>

    <!-- OPTION 1 : YouTube -->
    <div class="video">
        <iframe width="400" height="250"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        frameborder="0" allowfullscreen>
        </iframe>
    </div>

    <!-- OPTION 2 : vidéo locale (décommente si tu upload une vidéo) -->
    <!--
    <video width="400" controls>
        <source src="video.mp4" type="video/mp4">
    </video>
    -->
</section>

<!-- CONTACT -->
<section id="contact">
    <h2>Contact</h2>
    <p>Email : tonemail@gmail.com</p>
</section>

</body>
</html>
