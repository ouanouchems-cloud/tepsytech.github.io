<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TEPSY TECH</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #012169;
    color: white;
    text-align: center;
}

/* Logo */
.logo {
    width: 120px;
    margin-top: 30px;
}

/* Titre */
h1 {
    font-size: 50px;
    margin: 10px 0;
    letter-spacing: 2px;
}

/* Sous-titre */
p {
    font-size: 18px;
    opacity: 0.8;
}

/* Photo */
.photo {
    width: 200px;
    border-radius: 50%;
    margin: 30px 0;
    border: 4px solid #13B8A6;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

/* Bouton */
button {
    background: #13B8A6;
    color: white;
    border: none;
    padding: 15px 30px;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00566B;
    transform: scale(1.05);
}

/* Animation */
.fade {
    animation: fadeIn 2s ease-in;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

</head>

<body>

<img src="logo.png" class="logo fade">

<h1 class="fade">TEPSY TECH</h1>
<p class="fade">Santé & Technologie</p>

<img src="photo.jpg" class="photo fade">

<br>

<button class="fade">Me contacter</button>

</body>
</html>
