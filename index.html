<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TEPSY TECH</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #012169;
    color: white;
    text-align: center;
}

/* Logo */
.logo {
    width: 140px;
    margin-top: 80px;
    margin-bottom: 10px;
    background: transparent;
}

/* Titre */
h1 {
    font-size: 50px;
    margin: 10px 0;
}

/* Sous-titre */
p {
    font-size: 18px;
    opacity: 0.8;
}

/* Photo */
.photo {
    width: 220px;
    border-radius: 50%;
    margin: 30px 0;
    border: 4px solid #13B8A6;
}

/* Bouton */
button {
    background: #13B8A6;
    color: white;
    border: none;
    padding: 15px 30px;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #00566B;
}

/* Animation */
.fade {
    animation: fadeIn 1.5s ease-in;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

<body>

<img src="logo.png" style="width:120px; margin-top:40px;">

<h1>TEPSY TECH</h1>
<p>Santé & Technologie</p>

<img src="https://raw.githubusercontent.com/ouanouchems-cloud/tepsytech.github.io/main/photo.jpg">
width:200px;
border-radius:50%;
margin-top:20px;
border:4px solid #13B8A6;
">

<br><br>

<button style="
background:#13B8A6;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
">
Me contacter
</button>

</body>
</html>
