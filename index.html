<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEPSY TECH</title>

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: Arial;
    background-color: #0a2a66;
    color: white;
    text-align: center;
    scroll-behavior: smooth;
}

/* MENU */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: #071d4d;
    padding: 15px;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

/* SECTIONS */
section {
    padding: 100px 20px;
    opacity: 0;
    transform: translateY(50px);
    transition: all 0.8s ease;
}

/* ANIMATION ACTIVE */
section.visible {
    opacity: 1;
    transform: translateY(0);
}

/* LOGO */
.logo {
    width: 100px;
}

/* PHOTO */
.photo {
    width: 180px;
    border-radius: 50%;
    border: 4px solid #00bfa6;
    margin-top: 20px;
    transition: transform 0.4s;
}

.photo:hover {
    transform: scale(1.1);
}

/* TITRE */
h1 {
    font-size: 40px;
}

/* BOUTON */
button {
    margin-top: 20px;
    padding: 12px 25px;
    background: #00bfa6;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
}

button:hover {
    background: #009e88;
}

/* VIDEO */
.video iframe {
    max-width: 100%;
    border-radius: 10px;
}

/* FORM */
form {
    max-width: 400px;
    margin: auto;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 5px;
}

/* MOBILE */
@media (max-width: 600px) {
    nav a {
        display: block;
        margin: 10px 0;
    }

    .photo {
        width: 140px;
    }

    h1 {
        font-size: 26px;
    }
}

</style>
</head>

<body>

<!-- MENU -->
<nav>
    <a href="#accueil">Accueil</a>
    <a href="#apropos">À propos</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
</nav>

<!-- ACCUEIL -->
<section id="accueil">
    <img src="logo.png" class="logo">
    <h1>TEPSY TECH</h1>
    <p>Santé & Technologie</p>
    <button onclick="location.href='#contact'">Me contacter</button>
</section>

<!-- A PROPOS -->
<section id="apropos">
    <h2>À propos</h2>
    <p>Spécialisé dans la technologie et les solutions santé modernes.</p>
    <img src="photo.jpg" class="photo">
</section>

<!-- SERVICES -->
<section id="services">
    <h2>Mes Services</h2>
    <p>Création de sites web, solutions digitales, innovation santé.</p>
</section>

<!-- VIDEO -->
<section>
    <h2>Présentation</h2>
    <div class="video">
        <iframe width="400" height="250"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        frameborder="0" allowfullscreen>
        </iframe>
    </div>
</section>

<!-- CONTACT -->
<section id="contact">
    <h2>Contact</h2>

    <form action="https://formsubmit.co/tonemail@gmail.com" method="POST">
        <input type="text" name="name" placeholder="Votre nom" required>
        <input type="email" name="email" placeholder="Votre email" required>
        <textarea name="message" placeholder="Votre message" required></textarea>
        <button type="submit">Envoyer</button>
    </form>

</section>

<!-- SCRIPT ANIMATION SCROLL -->
<script>
const sections = document.querySelectorAll("section");

window.addEventListener("scroll", () => {
    sections.forEach(section => {
        const top = section.getBoundingClientRect().top;
        const trigger = window.innerHeight * 0.85;

        if (top < trigger) {
            section.classList.add("visible");
        }
    });
});
</script>

</body>
</html>
